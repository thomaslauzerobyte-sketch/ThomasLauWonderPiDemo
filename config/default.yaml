camera:
  backend: auto
  index: 0
  width: 640
  height: 480
  fps: 12
  ros_web_video_url: http://localhost:8080
  ros_snapshot_topics:
  - /depth_cam/rgb/image_raw
  ros_web_timeout_sec: 4
  opencv_indices:
  - 0
  - 1
  - 2
  - 3
  - 4
  - 5
  resolution_mode_index: 2
face_detect:
  backend: mediapipe
  mediapipe_min_confidence: 0.5
  mediapipe_model_selection: 0
  haar_scale_factor: 1.1
  haar_min_neighbors: 5
  haar_min_size: 60
face_tracking:
  pick: largest
  deadzone_px: 25
  smoothing: 0.5
  lost_frames_to_home: 30
  lost_seconds_to_home: 3.0
  loop_hz: 10
  fov_h_deg: 60
  fov_v_deg: 45
  yaw_kp: 0.45
  pitch_kp: 0.45
  yaw_min_deg: -75
  yaw_max_deg: 75
  pitch_min_deg: -45
  pitch_max_deg: 35
  max_yaw_step_deg: 8
  max_pitch_step_deg: 6
  home_pose:
    x: 0.18
    y: 0
    z: 0.1
    pitch: -10
  move_duration: 0.12
arm:
  driver: hiwonder
  mock: false
  docker_container: ArmPiUltra
  ik_pitch: -10.0
  grip_open_pulse: 100
  grip_close_pulse: 700
  move_duration: 0.12
  step_delay_sec: 0.0
  servo_invert:
  - 5
  image_width: 640
  image_height: 480
